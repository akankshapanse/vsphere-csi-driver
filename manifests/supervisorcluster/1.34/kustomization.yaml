apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: vmware-system-csi

resources:
  - cns-csi.yaml
  - cbt.storage.k8s.io_snapshotmetadataservices.yaml

# Inject CA certificate from Secret into SnapshotMetadataService CR
# This uses Kustomize's replacements feature to dynamically populate caBundle
replacements:
  - source:
      kind: Secret
      name: vmware-system-csi-snapshot-metadata-service-cert
      fieldPath: data.ca\.crt
    targets:
      - select:
          kind: SnapshotMetadataService
          name: vsphere-csi-snapshot-metadata
        fieldPaths:
          - spec.caCert
        options:
          create: true
